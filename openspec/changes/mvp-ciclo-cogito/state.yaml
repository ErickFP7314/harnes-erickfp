    nota: >
      0 CRITICAL, 1 WARNING, 3 SUGGESTIONS. 126/126 tests reales (pytest),
      ruff/mypy/lint-imports limpios, cobertura 95% (umbral 85%). 28/29
      escenarios de las 7 specs COMPLIANT (con test real que pasa), 1/29
